<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Desempeño | UIX Design Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --uix-purple-dark: #1A0033;
            --uix-purple-main: #2D0056;
            --uix-green: #7CFF01; /* El verde vibrante de UIX */
            --uix-green-dark: #6BD900;
            --white: #FFFFFF;
            --text-gray: #BDBDBD;
        }

        body { 
            font-family: 'Sora', sans-serif; 
            background-color: var(--uix-purple-dark); 
            color: var(--white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fondo decorativo similar a la imagen de referencia */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, var(--uix-purple-main) 0%, var(--uix-purple-dark) 70%);
            z-index: -1;
        }

        .login-screen {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .brand-logo span { color: var(--uix-green); }

        .login-card h2 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: var(--text-gray);
            padding-left: 5px;
        }

        select, input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--uix-green);
            background: rgba(255, 255, 255, 0.1);
        }

        select option { background: var(--uix-purple-dark); }

        .btn-uix {
            width: 100%;
            padding: 15px;
            background-color: var(--uix-green);
            color: var(--uix-purple-dark);
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, background-color 0.3s;
        }

        .btn-uix:hover {
            background-color: var(--uix-green-dark);
            transform: translateY(-2px);
        }

        .btn-uix:disabled {
            background-color: #4a4a4a;
            color: #888;
            cursor: not-allowed;
        }

        /* Dashboards temporales */
        .app-container { display: none; padding: 50px; text-align: center; width: 100%; }
        .app-container.active { display: block; }
        
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="brand-logo">uix<span>.</span></div>
            <h2>Gestión de Desempeño</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Tu Rol</label>
                    <select id="roleSelect" required>
                        <option value="" disabled selected>Selecciona tu Rol</option>
                        <option value="Colaborador">Colaborador</option>
                        <option value="Líder">Líder / Formador</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="emailInput" placeholder="ejemplo@uixdesign.com" required>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="passInput" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-uix" id="loginBtn">
                    Entrar al Sistema <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="colaboradorApp" class="app-container">
        <h1 style="color:var(--uix-green)">Bienvenido Colaborador</h1>
        <p id="colabName"></p>
        <button onclick="logout()" class="btn-uix" style="width:auto; margin: 20px auto;">Cerrar Sesión</button>
    </div>

    <div id="liderApp" class="app-container">
        <h1 style="color:var(--uix-green)">Panel de Líder</h1>
        <p id="liderName"></p>
        <button onclick="logout()" class="btn-uix" style="width:auto; margin: 20px auto;">Cerrar Sesión</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxLYxg_b_rhtAtgTIQQgJYbn_Mbpnyg3-7bdl7P2noV4RHym6StMSrHOBBXsXDicgw/exec";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const role = document.getElementById('roleSelect').value;
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passInput').value;

            btn.disabled = true;
            btn.innerHTML = 'Verificando... <i class="fas fa-spinner fa-spin"></i>';

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "login", email, password, role })
                });

                // Simulación de éxito para el MVP
                document.getElementById('loginScreen').style.display = 'none';
                if (role === 'Colaborador') {
                    document.getElementById('colaboradorApp').classList.add('active');
                    document.getElementById('colabName').textContent = email;
                } else {
                    document.getElementById('liderApp').classList.add('active');
                    document.getElementById('liderName').textContent = email;
                }
                localStorage.setItem('sesion_activa', email);
                localStorage.setItem('rol_activo', role);
            } catch (error) {
                alert("Error de conexión");
                btn.disabled = false;
                btn.innerHTML = 'Entrar al Sistema <i class="fas fa-arrow-right"></i>';
            }
        });

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
