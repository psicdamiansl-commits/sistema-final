<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uix. - Sistema de Gestión de Desempeño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* DISEÑO ORIGINAL PRESERVADO AL 100% */
        :root {
            --uix-purple-dark: #0a0118;
            --uix-red-main: #8b0000;
            --uix-green: #7CFF01;
            --card-bg: #1a0f35;
            --text-main: #ffffff;
            --text-dim: #a094b7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--uix-purple-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        #loginScreen {
            position: fixed;
            inset: 0;
            background: var(--uix-purple-dark);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: rgba(255,255,255,0.03);
            padding: 50px;
            border-radius: 30px;
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .sidebar {
            width: 280px;
            background: #070111;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            color: var(--text-dim);
            transition: 0.3s;
        }

        .nav-item.active {
            background: var(--uix-red-main);
            color: white;
            border-radius: 0 40px 40px 0;
            margin-right: 25px;
        }

        .main-container {
            flex: 1;
            padding: 40px 60px;
            height: 100vh;
            overflow-y: auto;
        }

        .obj-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            border-left: 6px solid var(--uix-red-main);
        }

        input, select {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-top: 8px;
            margin-bottom: 15px;
        }

        label {
            font-size: 0.7rem;
            color: var(--uix-green);
            font-weight: 700;
            text-transform: uppercase;
        }

        button {
            background: var(--uix-green);
            color: black;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1 style="color:var(--uix-green); font-size:3rem; margin-bottom:30px;">uix<span>.</span></h1>
            <div style="text-align: left;">
                <label>Rol de acceso</label>
                <select id="roleInput">
                    <option value="Colaborador">Colaborador</option>
                    <option value="Líder">Líder</option>
                </select>
                <label>Correo Electrónico</label>
                <input type="email" id="emailInput" placeholder="nombre@empresa.com">
                <label>Contraseña</label>
                <input type="password" id="passInput" placeholder="••••">
            </div>
            <button onclick="validaAcceso()" id="btnLogin" style="width:100%; margin-top:20px;">INGRESAR</button>
            <p id="loginMsg" style="color:#ff4d4d; font-size:0.8rem; margin-top:15px; font-weight:600;"></p>
        </div>
    </div>

    <div id="appLayout" class="hidden" style="display:flex; width:100%;">
        <aside class="sidebar">
            <div style="padding:0 30px 40px;">
                <p id="uRole" style="color:var(--uix-green); font-size:0.7rem; font-weight:700; text-transform:uppercase;"></p>
                <h3 id="uName" style="color:white; font-size:1.2rem;"></h3>
            </div>
            <div class="nav-item active"><i class="fas fa-bullseye"></i> Mis objetivos</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</div>
        </aside>

        <main class="main-container">
            <header style="margin-bottom: 40px;">
                <h2 style="font-size: 2rem;">Mis Objetivos Anuales</h2>
                <p style="color:var(--text-dim);">Completa tus indicadores de desempeño para el ciclo actual.</p>
            </header>

            <div id="regContainer">
                <div class="obj-card">
                    <label>Nombre del Objetivo / KPI</label>
                    <input type="text" class="obj-nombre" placeholder="Ej: Cumplimiento de ventas mensual">
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                        <div>
                            <label>Meta Numérica</label>
                            <input type="number" class="obj-meta" placeholder="0">
                        </div>
                        <div>
                            <label>Tendencia</label>
                            <select class="obj-tendencia">
                                <option>Incremental</option>
                                <option>Decremental</option>
                            </select>
                        </div>
                        <div>
                            <label>Peso Relativo (%)</label>
                            <input type="number" class="obj-peso" placeholder="1-100">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="enviarObjetivos()" id="btnSend" style="background:var(--uix-red-main); color:white; padding:18px 50px;">
                ENVIAR A REVISIÓN
            </button>
        </main>
    </div>

    <script>
        // URL ASIGNADA:
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyT7WVRYShhewkgaFgap1SddDS8glca9lKHhXMIdSh07Og27D92U6AklgCHendkjsY/exec";
        
        let sessionUser = {};

        async function validaAcceso() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            const role = document.getElementById('roleInput').value;
            const msg = document.getElementById('loginMsg');
            const btn = document.getElementById('btnLogin');

            if(!email || !pass) {
                msg.innerText = "Por favor, completa todos los campos.";
                return;
            }

            btn.innerText = "CONECTANDO...";
            msg.innerText = "";

            try {
                const response = await fetch(`${WEB_APP_URL}?action=login&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}&role=${encodeURIComponent(role)}`);
                const data = await response.json();

                if(data.autorizado) {
                    sessionUser = { email, nombre: data.nombre, role };
                    document.getElementById('uName').innerText = data.nombre;
                    document.getElementById('uRole').innerText = role;
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appLayout').classList.remove('hidden');
                } else {
                    msg.innerText = data.mensaje || "Datos incorrectos.";
                    btn.innerText = "INGRESAR";
                }
            } catch (error) {
                msg.innerText = "Error de conexión con el servidor.";
                btn.innerText = "INGRESAR";
            }
        }

        async function enviarObjetivos() {
            const btn = document.getElementById('btnSend');
            const goals = [];
            
            document.querySelectorAll('.obj-card').forEach(card => {
                const nombre = card.querySelector('.obj-nombre').value;
                const meta = card.querySelector('.obj-meta').value;
                const tendencia = card.querySelector('.obj-tendencia').value;
                const peso = card.querySelector('.obj-peso').value;

                if(nombre && meta && peso) {
                    goals.push({ nombre, meta, tendencia, peso });
                }
            });

            if(goals.length === 0) {
                alert("Por favor completa al menos un objetivo.");
                return;
            }

            btn.innerText = "ENVIANDO DATOS...";
            btn.disabled = true;

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: "guardar",
                        userEmail: sessionUser.email,
                        userName: sessionUser.nombre,
                        userRole: sessionUser.role,
                        goals: goals
                    })
                });

                alert("¡Tus objetivos han sido enviados exitosamente!");
                location.reload();

            } catch (error) {
                alert("Error al enviar.");
                btn.innerText = "ENVIAR A REVISIÓN";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
