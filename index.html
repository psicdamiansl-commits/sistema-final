<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uix. Sistema de Desempeño - V6 Mod</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --uix-purple-dark: #0a0118;
            --uix-red-main: #8b0000;
            --uix-green: #7CFF01;
            --bg-light: #f4f7f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--uix-purple-dark); height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR Y CONTENEDORES */
        .sidebar { width: 260px; background: #070111; padding: 30px 0; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); color: white; }
        .main-container { flex: 1; overflow-y: auto; background: var(--bg-light); color: #333; }
        .header-content { padding: 25px 40px; background: white; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .content-body { padding: 30px 40px; }

        /* CARDS DE OBJETIVOS */
        .obj-card { 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border-left: 4px solid var(--uix-red-main); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative; /* Para posicionar el botón eliminar */
        }
        
        /* BOTÓN ELIMINAR OBJETIVO */
        .btn-remove {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ffeded;
            color: #d93025;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-remove:hover { background: #d93025; color: white; }

        .btn-add { background: var(--uix-green); color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 0.8rem; }
        label { font-size: 0.65rem; color: #777; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width: 100%; border: 1px solid #dce1e7; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-family: 'Sora'; }

        .action-footer { margin-top: 30px; }
        .btn-send { background: var(--uix-red-main); color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="padding:0 25px 30px; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom:20px;">
            <p style="color:var(--uix-green); font-size:0.6rem; font-weight:700;">BIENVENIDO</p>
            <h5 id="uName">Damian Sanchez Linares</h5>
        </div>
    </aside>

    <main class="main-container">
        <div class="header-content">
            <div>
                <h2>Mis Objetivos</h2>
                <p style="font-size:0.8rem; color:#888;">Objetivos actuales: <span id="countObj">1</span>/5</p>
            </div>
            <button onclick="agregarObjetivo()" class="btn-add" id="btnAdd">+ Agregar Objetivo</button>
        </div>

        <div class="content-body">
            <div id="regContainer">
                <div class="obj-card" id="obj1">
                    <label>Objetivo 1</label>
                    <input type="text" placeholder="Nombre del objetivo">
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
                        <div><label>Meta</label><input type="number"></div>
                        <div><label>Tendencia</label>
                            <select>
                                <option value="Incremental">Incremental</option>
                                <option value="Decremental">Decremental</option>
                                <option value="Sostenible">Sostenible</option>
                            </select>
                        </div>
                        <div><label>Peso %</label><input type="number"></div>
                    </div>
                </div>
            </div>

            <div class="action-footer">
                <button class="btn-send">Guardar Objetivos</button>
            </div>
        </div>
    </main>

    <script>
        let totalObjetivos = 1;

        function agregarObjetivo() {
            if (totalObjetivos >= 5) {
                alert("Has alcanzado el máximo de 5 objetivos.");
                return;
            }

            totalObjetivos++;
            const container = document.getElementById('regContainer');
            
            const card = document.createElement('div');
            card.className = 'obj-card';
            card.id = `obj${totalObjetivos}`;
            
            card.innerHTML = `
                <button class="btn-remove" onclick="eliminarObjetivo('${card.id}')">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <label>Objetivo ${totalObjetivos}</label>
                <input type="text" placeholder="Nombre del objetivo">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
                    <div><label>Meta</label><input type="number"></div>
                    <div><label>Tendencia</label>
                        <select>
                            <option value="Incremental">Incremental</option>
                            <option value="Decremental">Decremental</option>
                            <option value="Sostenible">Sostenible</option>
                        </select>
                    </div>
                    <div><label>Peso %</label><input type="number"></div>
                </div>
            `;
            
            container.appendChild(card);
            actualizarEstado();
        }

        function eliminarObjetivo(id) {
            const card = document.getElementById(id);
            card.remove();
            totalObjetivos--;
            reordenarObjetivos();
            actualizarEstado();
        }

        function reordenarObjetivos() {
            const cards = document.querySelectorAll('.obj-card');
            cards.forEach((card, index) => {
                const nuevoNum = index + 1;
                card.id = `obj${nuevoNum}`;
                card.querySelector('label').innerText = `Objetivo ${nuevoNum}`;
                
                // Si es el primer objetivo, nos aseguramos de que no tenga botón de eliminar
                const btn = card.querySelector('.btn-remove');
                if (nuevoNum === 1 && btn) btn.remove();
            });
        }

        function actualizarEstado() {
            document.getElementById('countObj').innerText = totalObjetivos;
            // Bloquea o desbloquea el botón de agregar según el límite
            document.getElementById('btnAdd').style.opacity = (totalObjetivos >= 5) ? "0.5" : "1";
        }
    </script>
</body>
</html>
