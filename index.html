<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uix. Sistema de Desempeño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --uix-purple-dark: #120129;
            --uix-purple-card: #1d0a35;
            --uix-green: #7CFF01;
            --white: #FFFFFF;
            --text-muted: #8e82a3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--uix-purple-dark); color: var(--white); height: 100vh; overflow: hidden; display: flex; }

        /* LOGIN SCREEN - DISEÑO FIEL A LA IMAGEN */
        #loginScreen { position: fixed; inset: 0; background: var(--uix-purple-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.03); padding: 45px; border-radius: 30px; width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .login-card h1 { color: var(--uix-green); font-size: 3rem; margin-bottom: 5px; font-weight: 700; }
        .login-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 35px; letter-spacing: 1px; }

        /* ESTILO DE INPUTS Y SELECTS */
        input, select { 
            width: 100%; background: #1a0830; border: 1px solid #3d2b56; padding: 16px; 
            border-radius: 14px; color: white; margin-bottom: 18px; font-family: 'Sora'; font-size: 0.95rem;
            outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--uix-green); }
        
        /* BOTÓN VERDE NEÓN REDONDEADO */
        .btn-ingresar { 
            background: var(--uix-green); color: #000; width: 100%; padding: 16px; 
            border-radius: 40px; border: none; font-weight: 800; cursor: pointer; 
            font-size: 1rem; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* DASHBOARD Y CONTENIDO */
        .sidebar { width: 260px; background: rgba(0,0,0,0.2); padding: 30px 20px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .main-container { flex: 1; overflow-y: auto; padding: 40px; }
        .tab.active { color: var(--uix-green); border-bottom: 2px solid var(--uix-green); padding-bottom: 10px; }
        .obj-card { background: var(--uix-purple-card); padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        .comp-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h1>uix<span>.</span></h1>
            <p>Acceso Colaboradores 2026</p>
            
            <select id="roleInput">
                <option value="" disabled selected>Selecciona tu Rol</option>
                <option value="Colaborador Externo">Colaborador Externo</option>
                <option value="Formador/Lider">Formador/Lider</option>
            </select>
            
            <input type="email" id="emailInput" placeholder="Correo Corporativo">
            <input type="password" id="passInput" placeholder="Contraseña">
            
            <button class="btn-ingresar" id="loginBtn" onclick="handleLogin()">Ingresar</button>
        </div>
    </div>

    <aside class="sidebar">
        <div style="text-align:center; margin-bottom:40px;">
            <div style="width:60px; height:60px; background:#3d2b56; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; border: 2px solid var(--uix-green);">
                <i class="fas fa-user"></i>
            </div>
            <h4 id="uName">Usuario</h4>
            <p id="uRole" style="font-size:0.7rem; color:var(--uix-green); font-weight:700;">ROL</p>
        </div>
        <div class="nav-item active" style="color: var(--uix-green); padding: 10px; cursor: pointer;"><i class="fas fa-bullseye"></i> Mis Objetivos</div>
        <div class="nav-item" style="color: var(--text-muted); padding: 10px; cursor: pointer;"><i class="fas fa-history"></i> Historial</div>
        <div class="nav-item" style="margin-top:auto; color:#ff4d4d; cursor: pointer;" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Salir</div>
    </aside>

    <main class="main-container">
        <h2 style="margin-bottom:20px;">Registro de Objetivos (Máx 5)</h2>
        <div id="objsContainer">
            <div class="obj-card">
                <h4 style="color:var(--uix-green); margin-bottom:15px;">Objetivo 1 *</h4>
                <input type="text" class="in-n" placeholder="Nombre del objetivo">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <input type="text" class="in-m" placeholder="Meta Anual">
                    <select class="in-t">
                        <option value="Incremental">Incremental</option>
                        <option value="Sostenible">Sostenible</option>
                        <option value="Decremental">Decremental</option>
                    </select>
                    <input type="number" class="in-p" oninput="calc()" placeholder="Peso %">
                    <div style="display:flex; gap:5px;">
                        <input type="date" class="in-i" style="font-size: 0.7rem;">
                        <input type="date" class="in-f" style="font-size: 0.7rem;">
                    </div>
                </div>
            </div>
        </div>

        <button onclick="add()" style="width:100%; background:none; border:1px dashed var(--uix-green); color:var(--uix-green); padding:12px; border-radius:10px; cursor:pointer;">+ Añadir objetivo</button>

        <h3 style="margin: 30px 0 15px; color:var(--uix-green);">Competencias Organizacionales</h3>
        <div class="comp-card"><i class="fas fa-handshake"></i> <div><strong>Confianza y Respeto Mutuo</strong></div></div>
        <div class="comp-card"><i class="fas fa-check-circle"></i> <div><strong>Ejecución Impecable</strong></div></div>
        <div class="comp-card"><i class="fas fa-sync-alt"></i> <div><strong>Mejora Continua</strong></div></div>
        <div class="comp-card"><i class="fas fa-heart"></i> <div><strong>Pasión por el Cliente</strong></div></div>
        <div class="comp-card"><i class="fas fa-users"></i> <div><strong>Trabajo en Equipo</strong></div></div>

        <button class="btn-ingresar" style="margin-top:30px;" onclick="send()" id="btnSend">Enviar al Formador</button>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxd1vCbXl3byT1ooOovYzlLJaoKhOyEBgft420IFHyLQo3SAOuZmGHPF6y_5MdJ-lE/exec";
        let user = null;

        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const role = document.getElementById('roleInput').value;
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;

            if(!role || !email || !pass) return alert("Selecciona Rol, Correo y Contraseña.");

            btn.innerText = "Cargando...";
            btn.disabled = true;

            try {
                const response = await fetch(API, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", email, password: pass })
                });
                const data = await response.json();

                if(data.status === "success") {
                    user = data;
                    document.getElementById('uName').innerText = data.nombre;
                    document.getElementById('uRole').innerText = role; // Mostramos el rol elegido
                    document.getElementById('loginScreen').classList.add('hidden');
                } else {
                    alert("Credenciales incorrectas.");
                    btn.innerText = "Ingresar";
                    btn.disabled = false;
                }
            } catch(e) {
                alert("Error de conexión.");
                btn.innerText = "Ingresar";
                btn.disabled = false;
            }
        }

        function calc() {
            let t = 0;
            document.querySelectorAll('.in-p').forEach(i => t += Number(i.value || 0));
            return t;
        }

        function add() {
            const container = document.getElementById('objsContainer');
            if(container.querySelectorAll('.obj-card').length >= 5) return;
            const clone = container.querySelector('.obj-card').cloneNode(true);
            clone.querySelector('h4').innerText = `Objetivo ${container.querySelectorAll('.obj-card').length + 1} *`;
            clone.querySelectorAll('input').forEach(i => i.value = "");
            container.appendChild(clone);
        }

        async function send() {
            if(calc() !== 100) return alert("El peso total debe ser 100%.");
            const btn = document.getElementById('btnSend');
            btn.disabled = true; btn.innerText = "Enviando...";

            const objetivos = [];
            document.querySelectorAll('.obj-card').forEach(card => {
                objetivos.push({
                    nombre: card.querySelector('.in-n').value,
                    meta: card.querySelector('.in-m').value,
                    tendencia: card.querySelector('.in-t').value,
                    peso: card.querySelector('.in-p').value,
                    fechaInicio: card.querySelector('.in-i').value,
                    fechaFin: card.querySelector('.in-f').value
                });
            });

            try {
                const res = await fetch(API, {
                    method: "POST",
                    body: JSON.stringify({ action: "saveObjetivos", email: user.email, objetivos })
                });
                const data = await res.json();
                if(data.status === "success") {
                    alert("✅ ¡Enviado!");
                    location.reload();
                }
            } catch(e) { alert("Error al enviar."); btn.disabled = false; }
        }
    </script>
</body>
</html>
