<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Desempeño 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos base (basados en tu diseño original) */
        :root {
            --primary: #8B0000;
            --primary-dark: #660000;
            --success: #27AE60;
            --white: #FFFFFF;
            --light: #F4F7F6;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--light); margin: 0; }
        .hidden { display: none !important; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        
        /* Login */
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin: 100px auto; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--primary-dark); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Estructura App */
        .navbar { background: var(--primary); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .grid-objectives { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; background: white; padding: 15px; border-radius: 10px; }
        .header-grid { font-weight: bold; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loginScreen" class="container">
        <div class="login-card">
            <img src="https://via.placeholder.com/150x50?text=LOGO+NEGOCIO" alt="Logo" style="margin-bottom: 20px;">
            <h2>Iniciar Sesión</h2>
            <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
            <input type="password" id="loginPass" placeholder="Contraseña" required>
            <select id="loginRole">
                <option value="Colaborador Externo">Colaborador Externo</option>
                <option value="Líder/Formador">Líder / Formador</option>
            </select>
            <button id="btnLogin" onclick="handleLogin()">Entrar</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="navbar">
            <div><i class="fas fa-user-circle"></i> <span id="userNameDisplay"></span></div>
            <button onclick="logout()" style="width: auto; background: rgba(255,255,255,0.2); margin: 0;">Salir</button>
        </nav>

        <div class="container">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Registro de Objetivos Anuales 2026</h3>
                <p>Ingresa tus 5 objetivos. La suma de los pesos debe ser 100%.</p>
                
                <form id="objectivesForm">
                    <div class="grid-objectives header-grid">
                        <div>Descripción del Objetivo</div>
                        <div>Meta</div>
                        <div>Tendencia</div>
                        <div>Peso (%)</div>
                    </div>

                    <div id="objectivesContainer"></div>

                    <div style="text-align: right; margin-top: 20px;">
                        <span id="weightCounter">Total Peso: <strong id="totalWeight">0</strong>%</span>
                        <button type="submit" id="btnSubmitGoals" style="max-width: 250px; margin-left: 20px;">Enviar a mi Líder</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwfrZvqtALyAl1Wz6zZAayKbKKsGDAbtfdo-RKAjQYy_D0qxaHJEVGTV57Ua6_3HZI/exec";

        // 1. INICIALIZAR FORMULARIO (5 OBJETIVOS)
        const container = document.getElementById('objectivesContainer');
        for (let i = 1; i <= 5; i++) {
            container.innerHTML += `
                <div class="grid-objectives">
                    <input type="text" name="obj${i}" placeholder="Ej. Cumplimiento de KPI ${i}" required>
                    <input type="number" name="meta${i}" placeholder="Meta" required>
                    <select name="tendencia${i}">
                        <option value="Incremental">Incremental</option>
                        <option value="Decremental">Decremental</option>
                    </select>
                    <input type="number" name="peso${i}" class="weight-input" placeholder="0" min="1" max="100" required onchange="updateTotalWeight()">
                </div>
            `;
        }

        // 2. LÓGICA DE LOGIN
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const role = document.getElementById('loginRole').value;
            const btn = document.getElementById('btnLogin');

            if (!email || !pass) return alert("Completa los campos");

            btn.disabled = true;
            btn.textContent = "Verificando...";

            try {
                const response = await fetch(`${WEB_APP_URL}?action=login&email=${email}&pass=${pass}&role=${role}`);
                const data = await response.json();

                if (data.autorizado) {
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userName', data.nombre);
                    showApp(data.nombre);
                } else {
                    alert(data.mensaje);
                }
            } catch (error) {
                alert("Error de conexión con el servidor");
            } finally {
                btn.disabled = false;
                btn.textContent = "Entrar";
            }
        }

        function showApp(name) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userNameDisplay').textContent = name;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // 3. VALIDACIÓN DE PESOS
        function updateTotalWeight() {
            const inputs = document.querySelectorAll('.weight-input');
            let total = 0;
            inputs.forEach(input => total += parseFloat(input.value || 0));
            
            const display = document.getElementById('totalWeight');
            display.textContent = total;
            display.style.color = (total === 100) ? "green" : "red";
        }

        // 4. ENVÍO DE DATOS A GOOGLE SHEETS
        document.getElementById('objectivesForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const total = parseFloat(document.getElementById('totalWeight').textContent);
            if (total !== 100) {
                alert('La suma de los pesos debe ser exactamente 100% (Actual: ' + total + '%)');
                return;
            }

            const btn = document.getElementById('btnSubmitGoals');
            btn.disabled = true;
            btn.textContent = "Procesando...";

            const payload = {
                action: "guardar",
                userEmail: localStorage.getItem('userEmail'),
                goals: []
            };

            for (let i = 1; i <= 5; i++) {
                payload.goals.push({
                    nombre: document.querySelector(`input[name="obj${i}"]`).value,
                    meta: document.querySelector(`input[name="meta${i}"]`).value,
                    tendencia: document.querySelector(`select[name="tendencia${i}"]`).value,
                    peso: document.querySelector(`input[name="peso${i}"]`).value
                });
            }

            // Enviar vía POST
            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Necesario para Google Apps Script
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert('¡Éxito! Tus objetivos han sido enviados a tu Líder para aprobación.');
                location.reload();
            })
            .catch(err => {
                alert('Error al enviar datos');
                btn.disabled = false;
                btn.textContent = "Enviar a mi Líder";
            });
        });
    </script>
</body>
</html>
