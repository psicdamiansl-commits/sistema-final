<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uix. Sistema de Desempeño | 20260309_V17</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --uix-purple-dark: #0a0118;
            --uix-red-main: #8b0000;
            --uix-green: #7CFF01;
            --card-bg: #1a0f35;
            --text-main: #ffffff;
            --text-dim: #a094b7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Sora', sans-serif; 
            background: var(--uix-purple-dark); 
            color: var(--text-main); 
            min-height: 100vh;
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow-x: hidden;
        }

        .app-layout {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR ORIGINAL V12 */
        .sidebar { width: 280px; background: #070111; padding: 40px 0; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 15px 30px; display: flex; align-items: center; gap: 18px; cursor: pointer; color: var(--text-dim); font-size: 0.95rem; transition: 0.3s; }
        .nav-item.active { background: var(--uix-red-main); color: white; border-radius: 0 40px 40px 0; margin-right: 25px; }

        /* MAIN CONTENT */
        .main-container { flex: 1; overflow-y: auto; padding: 40px 60px; }
        
        .tab-menu { display: flex; gap: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        .tab-item { padding-bottom: 15px; font-size: 0.9rem; color: #666; cursor: pointer; font-weight: 600; }
        .tab-item.active { color: var(--uix-green); border-bottom: 3px solid var(--uix-green); }

        /* CARDS ESTILO V12 */
        .obj-card { 
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: 16px; 
            margin-bottom: 30px; 
            border-left: 6px solid var(--uix-red-main); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        label { font-size: 0.75rem; color: var(--uix-green); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }

        input, select, textarea { 
            background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            padding: 15px; 
            border-radius: 8px; 
            width: 100%; 
            margin-bottom: 20px; 
            font-family: 'Sora';
        }

        .btn-send { background: var(--uix-red-main); color: white; border: none; padding: 20px; border-radius: 12px; width: 70%; font-weight: 700; cursor: pointer; }
        .hidden { display: none !important; }

        #loginScreen { position: fixed; inset: 0; background: var(--uix-purple-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div style="background: rgba(255,255,255,0.03); padding: 50px; border-radius: 30px; width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
            <h1 style="color:var(--uix-green); font-size:3.5rem; margin-bottom:10px;">uix<span>.</span></h1>
            <input type="email" id="emailInput" placeholder="Correo">
            <input type="password" id="passInput" placeholder="Contraseña">
            <button onclick="validaAcceso()" id="btnLogin" style="background:var(--uix-green); color:black; width:100%; padding:18px; border-radius:35px; border:none; font-weight:800; cursor:pointer;">INGRESAR</button>
            <p id="loginMsg" style="color:#ff4d4d; font-size:0.85rem; margin-top:20px;"></p>
        </div>
    </div>

    <div id="appLayout" class="app-layout hidden">
        <aside class="sidebar">
            <div style="padding:0 30px 40px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <p id="uRole" style="color:var(--uix-green); font-size:0.7rem; font-weight:700;">ROL</p>
                <h5 id="uName" style="color:white; font-size:1.2rem; margin-top:5px;">Usuario</h5>
            </div>
            <nav>
                <div class="nav-item active"><i class="fas fa-bullseye"></i> Mis objetivos</div>
            </nav>
        </aside>

        <main class="main-container">
            <div class="tab-menu">
                <div class="tab-item active" onclick="switchSubTab(0, this)">Objetivos y Competencias</div>
                <div class="tab-item" onclick="switchSubTab(1, this)">Autoevaluación Mes 6</div>
            </div>

            <div id="subTab0" class="sub-tab-content">
                <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
                    <h2>Mis Objetivos</h2>
                    <button onclick="agregarObjetivo()" style="background:var(--uix-green); color:black; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">+ Nuevo</button>
                </div>
                <div id="regContainer">
                    <div class="obj-card">
                        <label>Objetivo</label>
                        <input type="text" class="obj-nombre">
                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                            <div><label>Meta</label><input type="number" class="obj-meta"></div>
                            <div><label>Peso %</label><input type="number" class="obj-peso"></div>
                            <div><label>Tendencia</label><select class="obj-tendencia"><option>Incremental</option><option>Decremental</option></select></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="subTab1" class="sub-tab-content hidden">
                <div id="eval6Container"></div>
            </div>

            <div style="margin-top:40px;">
                <button class="btn-send">ENVIAR A REVISIÓN</button>
            </div>
        </main>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwhPOQV_MLkTe3qNBdKbxAS67EYNCe2UnYhshDnAw9LXdwWGV2bDIhFl_f4FBwtRIw/exec";

        async function validaAcceso() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            try {
                const response = await fetch(`${WEB_APP_URL}?action=login&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}`);
                const data = await response.json();
                if(data.autorizado) {
                    document.getElementById('uName').innerText = data.nombre;
                    document.getElementById('uRole').innerText = data.rol;
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appLayout').classList.remove('hidden');
                } else {
                    document.getElementById('loginMsg').innerText = "Credenciales incorrectas";
                }
            } catch(e) { document.getElementById('loginMsg').innerText = "Error de conexión"; }
        }

        function switchSubTab(idx, el) {
            document.querySelectorAll('.sub-tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('subTab' + idx).classList.remove('hidden');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(idx === 1) sincronizarMes6();
        }

        function sincronizarMes6() {
            const container = document.getElementById('eval6Container');
            container.innerHTML = '<h2>Autoevaluación Mes 6</h2>';
            document.querySelectorAll('#regContainer .obj-card').forEach((obj, i) => {
                const nombre = obj.querySelector('.obj-nombre').value || `Objetivo ${i+1}`;
                const meta = parseFloat(obj.querySelector('.obj-meta').value) || 0;
                const div = document.createElement('div');
                div.className = 'obj-card';
                div.style.borderLeftColor = 'var(--uix-green)';
                div.innerHTML = `
                    <label>${nombre}</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div><label>Resultado</label><input type="number" oninput="calc(this, ${meta})"></div>
                        <div><label>% Cumplimiento</label><input type="text" class="p-view" readonly value="0%" style="color:var(--uix-green)"></div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function calc(input, meta) {
            const v = parseFloat(input.value) || 0;
            const res = input.parentElement.parentElement.querySelector('.p-view');
            if(meta > 0) res.value = Math.round((v/meta)*100) + "%";
        }

        function agregarObjetivo() {
            const container = document.getElementById('regContainer');
            const clone = container.firstElementChild.cloneNode(true);
            clone.querySelectorAll('input').forEach(i => i.value = "");
            container.appendChild(clone);
        }
    </script>
</body>
</html>
