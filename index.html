<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uix. Sistema de Desempeño | V15_FINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --uix-purple-dark: #0a0118; --uix-red-main: #8b0000; --uix-green: #7CFF01; --card-bg: #1a0f35; --text-main: #ffffff; --text-dim: #a094b7; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--uix-purple-dark); color: var(--text-main); min-height: 100vh; }
        #loginScreen { position: fixed; inset: 0; background: var(--uix-purple-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.03); padding: 50px; border-radius: 30px; width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .app-layout { display: flex; width: 100%; height: 100vh; }
        .sidebar { width: 280px; background: #070111; padding: 40px 0; border-right: 1px solid rgba(255,255,255,0.05); }
        .main-container { flex: 1; overflow-y: auto; padding: 40px 60px; }
        .tab-menu { display: flex; gap: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        .tab-item { padding-bottom: 15px; font-size: 0.9rem; color: #666; cursor: pointer; font-weight: 600; }
        .tab-item.active { color: var(--uix-green); border-bottom: 3px solid var(--uix-green); }
        .obj-card { background: var(--card-bg); padding: 30px; border-radius: 16px; margin-bottom: 25px; border-left: 6px solid var(--uix-red-main); }
        input, select, textarea { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; font-family: 'Sora'; }
        .hidden { display: none !important; }
        .btn-green { background: var(--uix-green); color: black; border: none; padding: 15px; border-radius: 30px; font-weight: 800; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h1 style="color:var(--uix-green); font-size:3rem; margin-bottom:5px;">uix<span>.</span></h1>
            <p style="color:white; opacity:0.5; font-size:0.7rem; margin-bottom:30px;">ACCESO COLABORADORES</p>
            <input type="email" id="emailInput" placeholder="Correo electrónico">
            <input type="password" id="passInput" placeholder="Contraseña">
            <button onclick="validaAcceso()" id="btnLogin" class="btn-green">INGRESAR</button>
            <p id="loginMsg" style="color:#ff4d4d; font-size:0.8rem; margin-top:15px;"></p>
        </div>
    </div>

    <div id="appLayout" class="app-layout hidden">
        <aside class="sidebar">
            <div style="padding:0 30px 40px;">
                <p id="uName" style="color:white; font-size:1.1rem; font-weight:600;">Cargando...</p>
                <p id="uRole" style="color:var(--uix-green); font-size:0.7rem;">ROL</p>
            </div>
            <div style="padding: 15px 30px; background: var(--uix-red-main); color: white;"><i class="fas fa-bullseye"></i> &nbsp; Mis objetivos</div>
        </aside>

        <main class="main-container">
            <div class="tab-menu">
                <div class="tab-item active" onclick="switchSubTab(0, this)">Objetivos y Competencias</div>
                <div class="tab-item" onclick="switchSubTab(1, this)">Autoevaluación Mes 6</div>
            </div>

            <div id="subTab0" class="sub-tab-content">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h2>Registro de Objetivos</h2>
                    <button onclick="agregarObjetivo()" style="background:var(--uix-green); color:black; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">+ Nuevo</button>
                </div>
                <div id="regContainer">
                    <div class="obj-card">
                        <label style="color:var(--uix-green); font-size:0.7rem;">NOMBRE DEL OBJETIVO</label>
                        <input type="text" class="obj-nombre" placeholder="Ej: Cumplimiento de ventas">
                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
                            <div><label style="font-size:0.7rem;">META</label><input type="number" class="obj-meta"></div>
                            <div><label style="font-size:0.7rem;">PESO (%)</label><input type="number" class="obj-peso"></div>
                            <div><label style="font-size:0.7rem;">TENDENCIA</label><select class="obj-tendencia"><option>Incremental</option><option>Decremental</option></select></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="subTab1" class="sub-tab-content hidden">
                <div id="eval6Container"></div>
            </div>
        </main>
    </div>

    <script>
        // PEGA AQUÍ TU NUEVO URL DE IMPLEMENTACIÓN
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz3XD5Z4PzmHg1psFbhZgPXc1iZ-SFCl6oXEgQ7s7na3zehZVx69LV8kq39-rWLtvw/exec";

        async function validaAcceso() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            const btn = document.getElementById('btnLogin');
            if(!email || !pass) return;

            btn.innerText = "VERIFICANDO...";
            try {
                const response = await fetch(`${WEB_APP_URL}?action=login&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}`);
                const data = await response.json();
                if(data.autorizado) {
                    document.getElementById('uName').innerText = data.nombre;
                    document.getElementById('uRole').innerText = data.rol;
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appLayout').classList.remove('hidden');
                } else {
                    document.getElementById('loginMsg').innerText = "Credenciales incorrectas.";
                    btn.innerText = "INGRESAR";
                }
            } catch(e) {
                document.getElementById('loginMsg').innerText = "Error de conexión.";
                btn.innerText = "INGRESAR";
            }
        }

        function switchSubTab(idx, el) {
            document.querySelectorAll('.sub-tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('subTab' + idx).classList.remove('hidden');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(idx === 1) sincronizarEvaluacion();
        }

        function sincronizarEvaluacion() {
            const container = document.getElementById('eval6Container');
            container.innerHTML = '<h2>Autoevaluación Mes 6</h2><p style="color:var(--text-dim); margin-bottom:30px;">Tus objetivos se han cargado automáticamente.</p>';
            
            document.querySelectorAll('#regContainer .obj-card').forEach((obj, i) => {
                const nombre = obj.querySelector('.obj-nombre').value || `Objetivo ${i+1}`;
                const meta = parseFloat(obj.querySelector('.obj-meta').value) || 0;
                
                const card = document.createElement('div');
                card.className = 'obj-card';
                card.style.borderLeftColor = 'var(--uix-green)';
                card.innerHTML = `
                    <label style="color:var(--uix-green)">${nombre}</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:15px;">
                        <div><label style="font-size:0.7rem;">RESULTADO LOGRADO</label><input type="number" oninput="calcPct(this, ${meta})"></div>
                        <div><label style="font-size:0.7rem;">% CUMPLIMIENTO</label><input type="text" class="pct-view" readonly value="0%" style="color:var(--uix-green); font-weight:bold;"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function calcPct(input, meta) {
            const val = parseFloat(input.value) || 0;
            const res = input.parentElement.parentElement.querySelector('.pct-view');
            if(meta > 0) res.value = Math.round((val/meta)*100) + "%";
        }

        function agregarObjetivo() {
            const container = document.getElementById('regContainer');
            const clone = container.firstElementChild.cloneNode(true);
            clone.querySelectorAll('input').forEach(i => i.value = "");
            container.appendChild(clone);
        }
    </script>
</body>
</html>
